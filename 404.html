<!DOCTYPE html>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0B1F17;
      color: #e2f0eb;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #1D9E75;
      letter-spacing: -0.5px;
      margin-bottom: 48px;
    }

    .pitch-icon {
      width: 90px;
      height: 60px;
      margin: 0 auto 32px;
      opacity: 0.35;
    }

    .code {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: #1D9E75;
      letter-spacing: -4px;

    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e2f0eb;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #7aab94;
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #1D9E75, #0F6E56);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .divider {
      width: 40px;
      height: 2px;
      background: rgba(29,158,117,0.3);
      margin: 40px auto 0;
      border-radius: 2px;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #3d6655;
    }
  </style>
</head>

  <div class="logo">⚽ Tactiq</div>

  <svg class="pitch-icon" viewBox="0 0 90 60" fill="none" xmlns="http://www.w3.org/2000/svg">
